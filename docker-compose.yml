services:
  postgres:
    image: postgres:17
    container_name: postgres-barchasb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/va/lib/postgresql/data
      - ./db-data/:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}

volumes:
  postgres-data:
